<div class="h-1/2 w-full bg-surface rounded-t-[32px] -mt-6 relative z-10 flex flex-col px-container-padding pt-lg pb-md shadow-[0_-8px_24px_rgba(0,0,0,0.06)]">
<!-- Brand & Tagline -->
<div class="text-center mb-lg flex flex-col items-center">
<h1 class="font-display text-display text-primary flex items-center justify-center gap-xs">
                Pawnder
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-xs">Join the pack</p>
</div>
<!-- Form Area -->
<form class="flex-1 flex flex-col max-w-sm mx-auto w-full">
<!-- Email Input -->
<div class="mb-md">
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant">person</span>
<input class="input-field w-full pl-lg pr-sm py-sm bg-surface-container-low border border-outline-variant rounded-xl text-on-surface placeholder:text-on-surface-variant/60 font-body-md transition-colors focus:bg-surface-container-lowest" id="email" placeholder="Email or Username" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="mb-lg">
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
<input class="input-field w-full pl-lg pr-sm py-sm bg-surface-container-low border border-outline-variant rounded-xl text-on-surface placeholder:text-on-surface-variant/60 font-body-md transition-colors focus:bg-surface-container-lowest" id="password" placeholder="Password" type="password"/>
</div>
<div class="text-right mt-xs">
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
</div>
<!-- Spacer -->
<div class="flex-1"></div>

<div class="flex flex-col gap-sm w-full mt-auto">

<button class="w-full bg-primary-container text-on-primary-container font-label-lg text-label-lg py-sm px-md rounded-full shadow-sm hover:shadow-md hover:bg-[#ffa062] active:scale-95 transition-all duration-200 flex items-center justify-center gap-2" type="button">

</button>
